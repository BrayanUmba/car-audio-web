name: "Seguridad - Auditoria semanal"

on:
  schedule:
    - cron: "0 9 * * 1" # Cada lunes 9:00 UTC (4:00 AM Colombia)
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  security-events: write

env:
  NODE_VERSION: "20"

jobs:
  # ──────────────────────────────────────────────
  # JOB 1: Auditoria completa de dependencias
  # ──────────────────────────────────────────────
  auditoria-completa:
    name: "Auditoria completa de dependencias"
    runs-on: ubuntu-latest
    steps:
      - name: "Descargar codigo"
        uses: actions/checkout@v4

      - name: "Configurar Node.js"
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: "Instalar dependencias"
        run: npm ci

      - name: "Ejecutar auditoria completa"
        id: audit
        run: |
          npm audit --json > audit-report.json 2>&1 || true
          VULNERABILITIES=$(node -e "
            const r = require('./audit-report.json');
            const v = r.metadata?.vulnerabilities || {};
            const total = (v.high || 0) + (v.critical || 0);
            console.log(total);
          ")
          echo "vulnerabilities_count=$VULNERABILITIES" >> $GITHUB_OUTPUT

          echo "### Reporte de auditoria de dependencias" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Nivel | Cantidad |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|----------|" >> $GITHUB_STEP_SUMMARY
          node -e "
            const r = require('./audit-report.json');
            const v = r.metadata?.vulnerabilities || {};
            console.log('| Critical | ' + (v.critical || 0) + ' |');
            console.log('| High | ' + (v.high || 0) + ' |');
            console.log('| Moderate | ' + (v.moderate || 0) + ' |');
            console.log('| Low | ' + (v.low || 0) + ' |');
          " >> $GITHUB_STEP_SUMMARY

      - name: "Crear issue si hay vulnerabilidades criticas"
        if: steps.audit.outputs.vulnerabilities_count != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `[Seguridad] Vulnerabilidades detectadas - ${new Date().toISOString().split('T')[0]}`;
            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'seguridad',
              per_page: 10
            });
            const alreadyExists = existingIssues.data.some(i => i.title.startsWith('[Seguridad] Vulnerabilidades'));
            if (!alreadyExists) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: `Se detectaron vulnerabilidades high/critical en las dependencias.\n\nEjecuta \`npm audit\` localmente para ver detalles y \`npm audit fix\` para corregir.\n\n> Issue creado automaticamente por el workflow de seguridad semanal.`,
                labels: ['seguridad']
              });
            }

  # ──────────────────────────────────────────────
  # JOB 2: SAST completo
  # ──────────────────────────────────────────────
  sast-completo:
    name: "Analisis SAST completo"
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - name: "Descargar codigo"
        uses: actions/checkout@v4

      - name: "Ejecutar Semgrep completo"
        run: semgrep scan --config auto --sarif --output semgrep-results.sarif .

      - name: "Subir resultados SARIF"
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep-results.sarif
        continue-on-error: true
