name: "CD - Post-deploy y versionado"

on:
  push:
    branches: [main]

permissions:
  contents: write

env:
  NODE_VERSION: "20"

jobs:
  # ──────────────────────────────────────────────
  # JOB 1: Tag de version automatico
  # ──────────────────────────────────────────────
  versionado:
    name: "Crear tag de version"
    runs-on: ubuntu-latest
    steps:
      - name: "Descargar codigo"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "Generar tag de version automatico"
        uses: anothrNick/github-tag-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BUMP: patch
          WITH_V: true
          DRY_RUN: false

  # ──────────────────────────────────────────────
  # JOB 2: Verificacion post-deploy
  # ──────────────────────────────────────────────
  verificacion-post-deploy:
    name: "Verificar deploy en Vercel"
    runs-on: ubuntu-latest
    needs: versionado
    steps:
      - name: "Esperar propagacion del deploy"
        run: sleep 90

      - name: "Verificar que el sitio responde"
        run: |
          SITE_URL="${{ vars.PRODUCTION_URL }}"
          if [ -z "$SITE_URL" ]; then
            echo "::warning::No se configuro PRODUCTION_URL en las variables del repositorio. Saltando verificacion."
            exit 0
          fi

          echo "Verificando $SITE_URL ..."
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$SITE_URL")

          if [ "$HTTP_STATUS" -eq 200 ]; then
            echo "El sitio responde correctamente (HTTP $HTTP_STATUS)"
          else
            echo "::error::El sitio respondio con HTTP $HTTP_STATUS"
            exit 1
          fi
